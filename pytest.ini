[pytest]
# Pytest configuration for common_tools

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    -ra

# Markers
markers =
    integration: Integration tests that use real APIs (deselect with '-m "not integration"')
    slow: Slow running tests (deselect with '-m "not slow"')
    modifies_data: Tests that modify real user data (deselect with '-m "not modifies_data"')

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if pytest-cov is installed)
# addopts = --cov=. --cov-report=html --cov-report=term

# Ignore patterns
norecursedirs = .git .tox dist build *.egg .venv venv
